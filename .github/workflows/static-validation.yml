name: Static Validation

on:
  push:
  pull_request:

jobs:
  source-quality:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install test dependency
        run: python -m pip install --upgrade pytest
      - name: Run source-only preflight
        env:
          EAGLE_WS: ${{ github.workspace }}
          REQUIRE_SOURCE_ONLY: '1'
        run: ./scripts/preflight_submission.sh
